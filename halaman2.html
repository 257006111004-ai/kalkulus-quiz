<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seputar Deret - Pembelajaran</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        /* Mengatur ulang margin */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'VT323', monospace;
        }

        /* Container utama background */
        .background-container {
            width: 100%;
            height: 100vh;
            
            /* 👇 GANTI NAMA BACKGROUND DI SINI 👇 */
            background-image: url('gambar/rafli/backround2.png'); 
            
            background-size: cover;
            background-position: top; /* Supaya awan atas nggak kepotong */
            background-repeat: no-repeat;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; /* Supaya kalau gambar kebesaran nggak muncul scroll */
        }

        /* Tombol Kembali di kiri atas */
        .btn-kembali {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            color: black;
            text-decoration: none;
            padding: 10px 20px;
            font-size: 24px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease, background 0.3s ease;
            z-index: 10;
        }

        .btn-kembali:hover {
            background-color: white;
            transform: scale(1.05);
        }

        /* Judul Halaman */
        .judul {
            color: #d1f5ff; /* Warna biru muda mirip di gambar */
            font-size: 50px;
            margin-top: 30px;
            letter-spacing: 3px;
            /* Memberikan efek bayangan supaya teks menonjol */
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            z-index: 5;
            text-align: center;
        }

        /* Wadah abu-abu untuk frame Youtube */
        .youtube-box {
            background-color: rgba(226, 238, 242, 0.9); /* Warna abu-abu muda */
            width: 80%;
            max-width: 650px;
            aspect-ratio: 16/9; /* Menjaga rasio layar memanjang */
            border-radius: 20px;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            z-index: 5;
        }

        /* Ukuran frame Youtube di dalam wadah */
        .youtube-box iframe {
            width: 95%;
            height: 92%;
            border-radius: 10px;
        }

        /* Wadah Karakter (Spongebob, Patrick, Mr Crab) di Kiri Bawah */
        .karakter-kiri {
            position: absolute;
            bottom: 0;
            left: 5%;
            width: 30%;
            max-width: 250px;
            z-index: 2;
        }

        .karakter-kiri img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Wadah Rumah Nanas di Kanan Bawah */
        .rumah-kanan {
            position: absolute;
            bottom: 0;
            right: 5%;
            width: 20%;
            max-width: 150px;
            z-index: 2;
        }

        .rumah-kanan img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Responsif untuk layar HP */
        @media (max-width: 600px) {
            .judul {
                font-size: 35px;
                margin-top: 70px; /* Diturunkan sedikit agar tidak nabrak tombol kembali */
            }
            .btn-kembali {
                padding: 8px 15px;
                font-size: 20px;
            }
            .youtube-box {
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <div class="background-container">
        <a href="index.html" class="btn-kembali">← Kembali</a>

        <h1 class="judul">SEPUTAR DERET</h1>

        <div class="youtube-box">
    <iframe src="https://www.youtube.com/embed/r-4fG7LB6Hw" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
</div>

        <div class="karakter-kiri">
            <img src="gambar/rafli/spongebobt-removebg-preview.png" alt="Karakter SpongeBob dkk">
        </div>

        <div class="rumah-kanan">
            <img src="gambar/rafli/nanast-removebg-preview.png" alt="Rumah Nanas">
        </div>
    </div>

</body>
</html>
